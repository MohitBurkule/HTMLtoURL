    <script src="js/codec.js"></script>
<script>
function b64DecodeUnicode(str) {
    // Legacy fallback: bytestream -> percent-encoding -> original string.
    return decodeURIComponent(atob(str).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
}

// Read the query string raw (don't let the browser turn "+" into spaces).
var query = location.search.replace(/^\?/, '');
var htmlSrc = '', jsSrc = '';

function getParam(qs, key) {
    var parts = qs.split('&');
    for (var i = 0; i < parts.length; i++) {
        if (parts[i].indexOf(key + '=') === 0) return parts[i].slice(key.length + 1);
    }
    return null;
}

if (getParam(query, 'd') !== null) {
    // New format: ?d=<htmlToken>&j=<jsToken>  (template-diff + LZString)
    htmlSrc = HTML2URLCodec.decode(getParam(query, 'd') || '');
    jsSrc   = HTML2URLCodec.decode(getParam(query, 'j') || '');
} else {
    // Legacy format: ?<htmlBase64>js=<jsBase64>
    var doc = query.split('js=');
    htmlSrc = b64DecodeUnicode(doc[0] || '');
    jsSrc   = doc[1] ? b64DecodeUnicode(doc[1]) : '';
}

document.getElementById('mainbody').innerHTML = htmlSrc;

if (jsSrc) {
    var script = document.createElement('script');
    script.innerHTML = jsSrc;
    document.head.appendChild(script);
}
</script>
