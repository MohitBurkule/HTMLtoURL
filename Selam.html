<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Şifre Gönderici</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: black;
  font-family: Arial, sans-serif;
  color: #00FFB8;
}

/* Loader */
#loader {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
}

/* Kare kutu */
.loader-box {
  width: 360px;
  height: 360px;
  background: #1c1c1c;
  border-radius: 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Yarım çember */
.half-circle {
  width: 50px;
  height: 35px;
  border: 4px solid #00FFB8;
  border-bottom: none;
  border-top-left-radius: 50px;
  border-top-right-radius: 50px;
  animation: rotate 1s linear infinite;
  margin-bottom: 15px;
}

.text {
  color: #ccc;
  font-size: 14px;
}

/* İçerik */
#content {
  display: none;
  text-align: center;
}

input {
  margin-top: 10px;
  padding: 10px;
  font-size: 18px;
  text-align: center;
  border-radius: 6px;
  border: none;
  outline: none;
  width: 140px;
}

button {
  margin-top: 15px;
  padding: 10px 18px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  background: #00FFB8;
  color: #000;
  font-weight: bold;
}

button:hover {
  opacity: 0.85;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- Yükleme ekranı -->
<div id="loader">
  <div class="loader-box">
    <div class="half-circle"></div>
    <div class="text">Yükleniyor...</div>
  </div>
</div>

<!-- Kod girişi -->
<div id="content">
  <h2>Kodu giriniz</h2>

  <input 
    type="text" 
    id="codeInput" 
    placeholder="****"
    inputmode="numeric"
    oninput="this.value=this.value.replace(/[^0-9]/g,'')"
  >

  <button onclick="window.location.href='https://youtu.be/-ShjBcApPnE?si=Wxk-05IHpj52tRMI'">
    Kodları öğren
  </button>
</div>

<script>
// Loader 3 saniye
setTimeout(() => {
  document.getElementById("loader").style.display = "none";
  document.getElementById("content").style.display = "block";
  document.getElementById("codeInput").focus();
}, 3000);

// Enter ile kontrol
document.getElementById("codeInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (this.value === "1234") {
      window.location.href =
        "https://www.mediafire.com/file/3q9fkz0a4gqypby/Super+Bear+Adventure+12.1.1+%28SSHAEGA%29.zip/file?dkey=0fxc81cdmnr&r=871";
    } 
    else if (this.value === "9186") {
      window.location.href =
        "https://www.mediafire.com/file/pbk5drd0cxw1r84/Stick_War_Saga_2025.4.2162.apk/file";
    } 
    else if (this.value === "4321") {
      window.location.href =
        "https://www.mediafire.com/file/jsolhegj8zjvjxw/Super_Bear_Adventure_Mod_Apk_Versi_12.0.4_mod_by_sshaega.apk/file";
    } 
    else if (this.value === "9736") {
      window.location.href =
        "https://apkadmin.com/oxhv5o6o5kdx/Super-Bear-Adventure-v12.1.3-MOD-MENU-GMA-__40_Getmodsapk.com__41_.apk.html";
    }
    else if (this.value === "6189") {
      window.location.href =
        "https://apkadmin.com/goj5idqsioif/Stick_War_Legacy_2025.1.217.apk.html";
    }
    else if (this.value === "5378") {
      window.location.href =
        "https://apkadmin.com/g687b59dbact/Shadow_Fight_2_Mod_V2.41.7.zip.html";
    }
    else {
      alert("Hatalı kod!");
      this.value = "";
    }
  }
});
</script>

</body>
    </html>
